name: Newman API Automation

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Newman
        run: npm install -g newman

      - name: Run API Tests
        run: newman run collection/*.json --env-var "BaseUrl=https://restful-booker.herokuapp.com/" --env-var "baseurl=https://restful-booker.herokuapp.com/"
