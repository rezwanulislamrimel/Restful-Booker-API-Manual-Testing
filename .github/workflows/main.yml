name: Restful Booker API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-tests:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3. Install Newman
      - name: Install Newman
        run: npm install -g newman

      # 4. Run API Tests (adjust path if needed)
      - name: Run Postman Collection
        run: |
          newman run collection/your-collection.json \
          -r cli,html \
          --reporter-html-export newman/report.html

      # 5. Upload report as artifact
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: newman/report.html
