name: Newman API Automation

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# গিটহাব রানারকে Node.js 24 ব্যবহার করতে বাধ্য করার জন্য এনভায়রনমেন্ট ভ্যারিয়েবল
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24" # এখানেও Node.js 24 সেট করে দেওয়া হলো

      - name: Install Newman
        run: npm install -g newman

      - name: Run API Tests
        run: newman run collection/*.json --env-var "BaseUrl=https://restful-booker.herokuapp.com" --env-var "baseurl=https://restful-booker.herokuapp.com"
